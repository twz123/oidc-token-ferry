name: Build
# This workflow is triggered on pushes to the repository.
on:
  push:
  pull_request:

permissions: {}

jobs:
  build:
    name: Build on ${{ matrix.go-os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
        - os: ubuntu-24.04
          go-os: linux
        - os: macos-26
          go-os: darwin
        - os: windows-2025
          go-os: windows
          binary-suffix: .exe
    env:
      CGO_ENABLED: '0'
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0 # fetch also tag info, relevant for detecting the version
        persist-credentials: false
    - name: Setup go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
    - name: Build binary
      run: make
    - name: Compress binary
      if: matrix.go-os != 'darwin'
      uses: svenstaro/upx-action@daf799fa059e79b583cea3ae4ea39f6f67825112 # v3.0.0
      with:
        files: |
          oidc-token-ferry${{ matrix.binary-suffix }}
        args: --best
        strip: false
    - name: Upload binary
      uses: actions/upload-artifact@v7
      with:
        name: oidc-token-ferry_${{ matrix.go-os }}-amd64${{ matrix.binary-suffix }}
        path: oidc-token-ferry${{ matrix.binary-suffix }}
